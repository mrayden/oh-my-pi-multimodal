# Syncs upstream can1357/oh-my-pi main → fork main daily.
# Requires the DISCORD_WEBHOOK_URL secret to be set in repo Settings → Secrets → Actions.

name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.name "aiproxy-bot"
          git config user.email "proxy@ai-auth-proxy.ayden.gg"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/can1357/oh-my-pi.git

      - name: Fetch upstream
        run: |
          git fetch upstream main

      - name: Get pending commit count
        id: commit_count
        run: |
          COUNT=$(git rev-list HEAD..upstream/main --count)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Pending commits: $COUNT"

      - name: Merge upstream and push
        id: merge
        if: steps.commit_count.outputs.count != '0'
        run: |
          git merge --no-edit upstream/main || {
            git merge --abort
            echo "merge_failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          }
          git push origin main
          echo "merge_failed=false" >> "$GITHUB_OUTPUT"

      - name: Re-apply fork identity after merge
        if: steps.commit_count.outputs.count != '0' && steps.merge.outputs.merge_failed != 'true'
        run: |
          # APP_NAME — upstream always says "omp"; we need "ompm"
          sed -i 's/export const APP_NAME: string = "omp";/export const APP_NAME: string = "ompm";/' \
            packages/utils/src/dirs.ts

          # install.sh REPO and source-mode REF default
          sed -i 's|^REPO="can1357/oh-my-pi"|REPO="mrayden/oh-my-pi-multimodal"|' scripts/install.sh
          grep -q 'Fork: source without' scripts/install.sh || {
            sed -i '/^if \[ "\$MODE" = "source" \] && \[ -z "\$REF" \]; then/,+2d' scripts/install.sh
            sed -i '/^# If a ref is provided/a # Fork: source without --ref defaults to main branch (no npm package for this fork)\nif [ "$MODE" = "source" ] && [ -z "$REF" ]; then\n    REF="main"\nfi' \
              scripts/install.sh
          }

          # bin name in coding-agent package.json
          python3 -c "
import json
with open('packages/coding-agent/package.json') as f: d = json.load(f)
if 'omp' in d.get('bin', {}):
    d['bin']['ompm'] = d['bin'].pop('omp')
    with open('packages/coding-agent/package.json', 'w') as f:
        json.dump(d, f, indent='\\t'); f.write('\\n')
    print('Fixed bin: omp -> ompm')
"

          # User-facing command strings in source files
          sed -i \
            -e 's/Install with: omp plugin install/Install with: ompm plugin install/' \
            packages/coding-agent/src/modes/components/plugin-settings.ts
          sed -i \
            -e 's/Usage: omp ssh/Usage: ompm ssh/g' \
            -e 's/Add one with: omp ssh/Add one with: ompm ssh/g' \
            packages/coding-agent/src/cli/ssh-cli.ts
          sed -i 's/omp agents unpack/ompm agents unpack/g' \
            packages/coding-agent/src/cli/args.ts

          # Commit only if upstream dirtied our fork-specific files
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'chore: re-apply fork identity after upstream sync'
            git push origin main
          fi

      - name: Get new version from package.json
        id: version
        if: steps.commit_count.outputs.count != '0' && steps.merge.outputs.merge_failed != 'true'
        run: |
          VERSION=$(cat packages/ai/package.json | jq -r .version 2>/dev/null \
            || cat package.json | jq -r .version 2>/dev/null \
            || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Discord notification — success (changes merged)
        if: steps.commit_count.outputs.count != '0' && steps.merge.outputs.merge_failed != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COUNT: ${{ steps.commit_count.outputs.count }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Upstream sync complete\",\"color\":5763719,\"fields\":[{\"name\":\"Commits merged\",\"value\":\"$COUNT\",\"inline\":true},{\"name\":\"Version\",\"value\":\"$VERSION\",\"inline\":true}],\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}"

      - name: Discord notification — already up to date
        if: steps.commit_count.outputs.count == '0'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Upstream sync — already up to date\",\"color\":9807270,\"description\":\"No new commits from upstream.\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}"

      - name: Discord notification — merge conflict / failure
        if: failure() || steps.merge.outputs.merge_failed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Upstream sync FAILED\",\"color\":15548997,\"description\":\"Merge conflict or push error. Manual intervention required.\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}"
